<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Styled Page</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-2xl p-10 w-[90%] max-w-md text-center">
    
    <h1 class="text-4xl font-bold text-gray-800 mb-4">
      Welcome 🚀
    </h1>

    <p class="text-gray-600 mb-8">
      Beautifully designed page using Tailwind CSS.
    </p>

    <div class="space-y-4">
      <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-md">
        Get Started
      </button>

      <button class="w-full bg-purple-500 hover:bg-purple-600 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-md">
        Learn More
      </button>

      <button class="w-full border-2 border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold py-3 rounded-xl transition duration-300">
        Contact Us
      </button>
    </div>

  </div>

</body>
</html>
