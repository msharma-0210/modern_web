<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Website Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family: Arial, sans-serif;
}
pre{
white-space: pre-wrap;
word-wrap: break-word;
}
iframe{
border:1px solid #ddd;
border-radius:12px;
}
</style>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-100 min-h-screen p-6">

<div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl p-8">

<h1 class="text-4xl font-bold text-center text-gray-800 mb-3">
AI Website Generator 🚀
</h1>

<p class="text-center text-gray-500 mb-8">
Generate full websites using Gemini AI
</p>

<textarea
id="prompt"
placeholder="Example: Modern portfolio website for developer"
class="w-full h-36 border rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-400 resize-none mb-5"
></textarea>

<button
onclick="generate()"
class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl shadow-lg transition mb-8"
>
Generate Website
</button>

<div class="grid md:grid-cols-2 gap-6">

<div class="bg-gray-100 rounded-xl p-4">
<h2 class="text-xl font-bold mb-3 text-gray-700">Generated HTML Code</h2>

<pre id="result" class="text-sm text-gray-800 max-h-[600px] overflow-auto">
Your generated code will appear here...
</pre>
</div>

<div class="bg-gray-100 rounded-xl p-4">
<h2 class="text-xl font-bold mb-3 text-gray-700">Live Preview</h2>

<iframe id="preview" class="w-full h-[600px] bg-white"></iframe>
</div>

</div>

</div>

<script>

const api_key = "AIzaSyBeAvvWfgXht48_zW6bGDieh5t0nLQhJAY";

async function generate(){

const prompt = document.getElementById("prompt").value;

if(!prompt){
alert("Please enter prompt");
return;
}

document.getElementById("result").textContent = "Generating...";
document.getElementById("preview").srcdoc = "<h1 style='font-family:sans-serif;padding:20px;'>Generating...</h1>";

const fullPrompt = `
Generate a complete beautiful website in HTML with inline CSS.

Topic: ${prompt}

Rules:
- Output only HTML
- Include <html>, <head>, <body>
- Modern UI
- Mobile responsive
- Attractive colors
- Professional layout
`;

try{

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-goog-api-key":api_key
},
body: JSON.stringify({
contents:[
{
parts:[
{
text: fullPrompt
}
]
}
]
})
}
);

const data = await response.json();

if(data.candidates){

let output = data.candidates[0].content.parts[0].text;

output = output.replace(/```html/g,"").replace(/```/g,"");

document.getElementById("result").textContent = output;

document.getElementById("preview").srcdoc = output;

}else{

document.getElementById("result").textContent =
JSON.stringify(data,null,2);

}

}catch(error){

console.log(error);

document.getElementById("result").textContent = "Error generating website.";

}

}

</script>

</body>
</html>
